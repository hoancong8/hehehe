<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: black;
        }
    </style>
        <script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js"
  }
}
</script>
</head>

<body>

    <script type="module">

        import * as THREE from "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js";

        import { FontLoader } from "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/loaders/FontLoader.js";

        import { TextGeometry } from "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/geometries/TextGeometry.js";

        import { MeshSurfaceSampler } from "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/math/MeshSurfaceSampler.js";

        let scene = new THREE.Scene();

        let camera = new THREE.PerspectiveCamera(
            75,
            window.innerWidth / window.innerHeight,
            0.1,
            1000
        );

        camera.position.z = 200;

        let renderer = new THREE.WebGLRenderer({ antialias: true });

        renderer.setSize(window.innerWidth, window.innerHeight);

        document.body.appendChild(renderer.domElement);

        const particles = 2000;

        const positions = new Float32Array(particles * 3);

        const geometry = new THREE.BufferGeometry();

        geometry.setAttribute(
            "position",
            new THREE.BufferAttribute(positions, 3)
        );

        const material = new THREE.PointsMaterial({
            color: 0xffffff,
            size: 2
        });

        const points = new THREE.Points(geometry, material);

        scene.add(points);

        const loader = new FontLoader();

        loader.load(
            "https://threejs.org/examples/fonts/helvetiker_regular.typeface.json",

            (font) => {

                const textGeo = new TextGeometry("HOAN DZ", {
                    font: font,
                    size: 50,
                    height: 5
                });

                textGeo.center();

                const mesh = new THREE.Mesh(textGeo);

                const sampler = new MeshSurfaceSampler(mesh).build();

                const temp = new THREE.Vector3();

                for (let i = 0; i < particles; i++) {

                    sampler.sample(temp);

                    positions[i * 3] = temp.x;
                    positions[i * 3 + 1] = temp.y;
                    positions[i * 3 + 2] = temp.z;

                }

                geometry.attributes.position.needsUpdate = true;

            }
        );

        function animate() {

            requestAnimationFrame(animate);

            points.rotation.y += 0.002;

            renderer.render(scene, camera);

        }

        animate();

    </script>

</body>

</html>
